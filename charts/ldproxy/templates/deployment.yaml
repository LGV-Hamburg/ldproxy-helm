apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ldproxy.fullname" . }}
  labels:
    {{- include "ldproxy.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ldproxy.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ldproxy.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.image.pullSecret }}
      imagePullSecrets:
        - name: {{ .Values.image.pullSecret }}
      {{- end }}
      {{- if .Values.serviceConfig.useConfigMaps }}
      initContainers:
        - name: init-store
          image: {{ .Values.initContainer.image }}
          command:
            - sh
            - -c
            - |-
              set -e
              mkdir -p /store/entities/instances/services
              mkdir -p /store/entities/instances/providers
              mkdir -p /store/entities/defaults
              mkdir -p /store/entities/overrides
              mkdir -p /store/values
              mkdir -p /store/resources
              cp /cm-cfg/cfg.yml /store/cfg.yml
              cp /cm-service/{{ .Values.serviceConfig.serviceConfigKey }} \
                /store/entities/instances/services/{{ .Values.serviceConfig.serviceConfigKey }}
              cp /cm-provider/{{ .Values.serviceConfig.providerConfigKey }} \
                /store/entities/instances/providers/{{ .Values.serviceConfig.providerConfigKey }}
          volumeMounts:
            - name: store
              mountPath: /store
            - name: cfg
              mountPath: /cm-cfg
            - name: service-config
              mountPath: /cm-service
            - name: provider-config
              mountPath: /cm-provider
      {{- end }}
      containers:
        - name: ldproxy
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            # Example: ensure ldproxy looks for its data in /data
            - name: LDPROXY_DATA_DIR
              value: {{ .Values.persistence.mountPath | quote }}
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
          {{- end }}
          volumeMounts:
            {{- if .Values.serviceConfig.useConfigMaps }}
            # store was fully initialised by the init container — real files, no symlinks
            - name: store
              mountPath: /data
            {{- else }}
            # cfg.yml via subPath: only ok here because service/provider configs live on the PVC
            - name: cfg
              mountPath: /data/cfg.yml
              subPath: cfg.yml
            {{- end }}
            # PVC for geodata (GPKG), mounted on top of /data
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
            - name: tmp
              mountPath: /data/tmp
          resources:
{{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if .Values.serviceConfig.useConfigMaps }}
        - name: store
          emptyDir: {}
        - name: service-config
          configMap:
            name: {{ .Values.serviceConfig.serviceConfigMap }}
        - name: provider-config
          configMap:
            name: {{ .Values.serviceConfig.providerConfigMap }}
        {{- end }}
        - name: cfg
          configMap:
            name: {{ if .Values.serverConfig.existingCfgConfigMap }}{{ .Values.serverConfig.existingCfgConfigMap }}{{ else }}{{ include "ldproxy.fullname" . }}-cfg{{ end }}
        - name: data
          {{- if and .Values.persistence.enabled .Values.persistence.existingClaim }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim }}
          {{- else if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "ldproxy.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}