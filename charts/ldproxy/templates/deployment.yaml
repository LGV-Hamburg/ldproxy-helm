apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ldproxy.fullname" . }}
  labels:
    {{- include "ldproxy.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ldproxy.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ldproxy.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: ldproxy
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.image.pullSecret }}
          imagePullSecrets:
            - name: {{ .Values.image.pullSecret }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            # Example: ensure ldproxy looks for its data in /ldproxy/data
            - name: LDPROXY_DATA_DIR
              value: {{ .Values.persistence.mountPath | quote }}
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
          {{- if .Values.serviceConfig.useConfigMaps }}
            # Mount the full ConfigMap as a directory so Kubernetes automatically
            # propagates updates when the ConfigMap changes (subPath would prevent this).
            - name: service-config
              mountPath: /ldproxy/data/entities/instances/features/services
            - name: provider-config
              mountPath: /ldproxy/data/entities/instances/features/providers
          {{- end }}
            - name: cfg
              mountPath: /ldproxy/data
            - name: tmp
              mountPath: /ldproxy/data/tmp
              readOnly: false
          resources:
{{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: tmp
          emptyDir: {}
        - name: data
          {{- if and .Values.persistence.enabled .Values.persistence.existingClaim }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim }}
          {{- else if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "ldproxy.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- if .Values.serviceConfig.useConfigMaps }}
        - name: service-config
          configMap:
            name: {{ .Values.serviceConfig.serviceConfigMap }}
        - name: provider-config
          configMap:
            name: {{ .Values.serviceConfig.providerConfigMap }}
      {{- end }}
        - name: cfg
          configMap:
        {{if not .Values.serverConfig.existingCfgConfigMap }}
            name: {{ include "ldproxy.fullname" . }}-cfg
        {{else}}
            name: {{ .Values.serverConfig.existingCfgConfigMap }}
        {{- end }}